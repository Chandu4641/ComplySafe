name: Phase 1 Release Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/complysafe
      NEXT_PUBLIC_APP_NAME: ComplySafe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Phase 1 static verifier
        run: npm run phase1:verify

      - name: Phase 1 closure verifier
        run: npm run phase1:closure -- --strict

      - name: Upload Phase 1 verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase1-verification-evidence
          path: |
            docs/verification/phase1-verification.json
            docs/verification/phase1-closure-status.json
