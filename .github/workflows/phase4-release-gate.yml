name: Phase 4 Release Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  release-gate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: complysafe
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/complysafe
      NEXT_PUBLIC_APP_NAME: ComplySafe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Phase 4 static verifier
        run: npm run phase4:verify

      - name: Phase 4 regression verifier
        run: npm run phase4:regression

      - name: Phase 4 closure verifier (strict)
        run: npm run phase4:closure -- --strict

      - name: Upload Phase 4 verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phase4-verification-evidence
          path: docs/verification/
